services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_PASSWORD=workshop123
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        cp /var/lib/neo4j/labs/apoc-*-core.jar /var/lib/neo4j/plugins/apoc.jar
        grep -q '^server.default_listen_address=' /var/lib/neo4j/conf/neo4j.conf ||
          printf '\nserver.default_listen_address=0.0.0.0\nserver.memory.pagecache.size=256M\ndb.tx_log.preallocate=false\ndbms.security.procedures.unrestricted=apoc.*\ndbms.security.procedures.allowlist=apoc.*\n' >> /var/lib/neo4j/conf/neo4j.conf
        mkdir -p /data/dbms
        neo4j-admin dbms set-initial-password "$${NEO4J_PASSWORD:-workshop123}" || true
        exec neo4j console
    volumes:
      - neo4j_data:/data

volumes:
  qdrant_data:
  neo4j_data: